name = "revitaliza-fitness-web"
main = "src/index.js"
compatibility_date = "2025-04-22"

[site]
bucket = "./out"

[build]
command = "npm run build && npm run export"

[env.production]
name = "revitaliza-fitness-web-production"
route = "revitaliza-fitness.com/*"
zone_id = "your_cloudflare_zone_id"

[env.staging]
name = "revitaliza-fitness-web-staging"
route = "staging.revitaliza-fitness.com/*"
